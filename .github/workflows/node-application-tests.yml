name: 'Node.js Tests'

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node.js version to install'
        required: false
        default: '22'
        type: string

jobs:
  tests-run:
    name: 'Node.js test suite'
    runs-on: arc-runner-set

    steps:
      - uses: actions/checkout@v4

      - name: Detect package manager
        shell: bash
        run: |
          if [ ! -f package.json ]; then
            echo 'package.json was not found.'
            exit 1
          fi

          if [ -f pnpm-lock.yaml ]; then
            echo 'PACKAGE_MANAGER=pnpm' >> "$GITHUB_ENV"
            exit 0
          fi

          if [ -f yarn.lock ]; then
            echo 'PACKAGE_MANAGER=yarn' >> "$GITHUB_ENV"
            exit 0
          fi

          echo 'PACKAGE_MANAGER=npm' >> "$GITHUB_ENV"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Cache package-manager data
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ~/.pnpm-store
            .yarn/cache
            .yarn/unplugged
            .yarn/install-state.gz
          key: "node-${{ runner.os }}-${{ inputs.node-version }}-${{ hashFiles('package-lock.json', 'npm-shrinkwrap.json', 'pnpm-lock.yaml', 'yarn.lock') }}"
          restore-keys: |
            node-${{ runner.os }}-${{ inputs.node-version }}-

      - name: Enable Corepack
        shell: bash
        run: corepack enable

      - name: Install dependencies
        shell: bash
        run: |
          case "$PACKAGE_MANAGER" in
            npm)
              if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
                npm ci
              else
                npm install
              fi
              ;;
            pnpm)
              pnpm install --frozen-lockfile
              ;;
            yarn)
              yarn install --immutable || yarn install --frozen-lockfile
              ;;
          esac

      - name: Run tests
        shell: bash
        run: |
          if ! node -e "const pkg=require('./package.json'); process.exit(pkg.scripts && pkg.scripts.test ? 0 : 1)"; then
            echo 'No test script was found in package.json.'
            exit 1
          fi

          case "$PACKAGE_MANAGER" in
            npm)
              npm test
              ;;
            pnpm)
              pnpm test
              ;;
            yarn)
              yarn test
              ;;
          esac

      - name: Upload coverage artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: node-coverage
          path: coverage
          if-no-files-found: ignore
