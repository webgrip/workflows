name: 'Go Tests'

on:
  workflow_call:
    inputs:
      go-version:
        description: 'Go version to install'
        required: false
        default: '1.24'
        type: string

jobs:
  tests-run:
    name: 'Go test suite'
    runs-on: arc-runner-set

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}
          cache: true

      - name: Ensure Go module exists
        id: ensure-module
        shell: bash
        run: |
          if [ ! -f go.mod ]; then
            echo 'go.mod was not found.'
            exit 1
          fi

      - name: Download dependencies
        id: download-dependencies
        shell: bash
        run: |
          start=$(date +%s)
          go mod download
          end=$(date +%s)
          echo "seconds=$((end-start))" >> "$GITHUB_OUTPUT"

      - name: Run tests
        id: test
        shell: bash
        run: |
          mkdir -p test-results
          start=$(date +%s)
          go test ./... -coverprofile=coverage.out | tee test-results/go-test-output.txt
          end=$(date +%s)
          echo "seconds=$((end-start))" >> "$GITHUB_OUTPUT"

      - name: Upload test results
        id: upload-results
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: go-test-results
          path: |
            coverage.out
            test-results
          if-no-files-found: ignore

      - name: Render summary
        if: ${{ always() }}
        uses: webgrip/workflows/.github/composite-actions/workflow-status-summary@main
        with:
          title: 'Go Tests'
          subtitle: 'Test execution for Go modules'
          metadata: |
            [
              {"label":"Runner","value":"arc-runner-set"},
              {"label":"Go version","value":"${{ inputs.go-version }}"}
            ]
          checks: |
            [
              {"name":"Module presence","status":"${{ steps.ensure-module.outcome }}","duration":"-","details":"go.mod required"},
              {"name":"Download dependencies","status":"${{ steps.download-dependencies.outcome }}","duration":"${{ steps.download-dependencies.outputs.seconds }}s","details":"go mod download"},
              {"name":"Test execution","status":"${{ steps.test.outcome }}","duration":"${{ steps.test.outputs.seconds }}s","details":"go test ./... with coverage"},
              {"name":"Results upload","status":"${{ steps.upload-results.outcome }}","duration":"-","details":"artifact go-test-results"}
            ]
          artifacts: |
            ["go-test-results"]
