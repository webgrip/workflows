name: '.NET Static Analysis'

on:
  workflow_call:
    inputs:
      dotnet-version:
        description: 'Deprecated compatibility input. arc-runner-set uses the runner-provided .NET SDK.'
        required: false
        default: '8.0.x'
        type: string
      working-directory:
        description: 'Directory that contains the .NET solution or project'
        required: false
        default: '.'
        type: string
      target-path:
        description: 'Optional solution or project path relative to the working directory'
        required: false
        default: ''
        type: string
      restore-arguments:
        description: 'Additional arguments passed to dotnet restore'
        required: false
        default: ''
        type: string
      build-configuration:
        description: 'Build configuration'
        required: false
        default: 'Release'
        type: string
      run-format-check:
        description: 'Run dotnet format verification'
        required: false
        default: true
        type: boolean
      run-vulnerability-scan:
        description: 'Run vulnerable package scan'
        required: false
        default: true
        type: boolean
      run-outdated-check:
        description: 'Report outdated packages'
        required: false
        default: true
        type: boolean

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: true

jobs:
  static-analysis-run:
    name: 'Static Analysis (.NET Format, Build, Vulnerabilities, Outdated)'
    runs-on: arc-runner-set

    steps:
      - uses: actions/checkout@v4

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.nuget/packages
            ~/.local/share/NuGet/v3-cache
          key: "nuget-${{ runner.os }}-${{ hashFiles('NuGet.Config', 'global.json', format('{0}/**/*.csproj', inputs.working-directory), format('{0}/**/*.fsproj', inputs.working-directory), format('{0}/**/*.vbproj', inputs.working-directory), format('{0}/**/*.props', inputs.working-directory), format('{0}/**/*.targets', inputs.working-directory), format('{0}/**/packages.lock.json', inputs.working-directory)) }}"
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Detect .NET target
        id: detect-target
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        run: |
          target_path="${{ inputs.target-path }}"

          if [ -z "$target_path" ]; then
            target_path="$(find . -maxdepth 5 \( -name '*.sln' -o -name '*.csproj' -o -name '*.fsproj' -o -name '*.vbproj' \) | sort | head -n 1)"
          fi

          if [ -z "$target_path" ]; then
            echo "No .NET solution or project files were found."
            exit 1
          fi

          echo "DOTNET_TARGET=$target_path" >> "$GITHUB_ENV"
          echo "target=$target_path" >> "$GITHUB_OUTPUT"

      - name: Restore dependencies
        id: restore
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        run: |
          start=$(date +%s)
          dotnet restore "$DOTNET_TARGET" ${{ inputs.restore-arguments }}
          end=$(date +%s)
          echo "seconds=$((end-start))" >> "$GITHUB_OUTPUT"

      - name: Verify formatting
        id: format
        if: ${{ inputs.run-format-check }}
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        run: |
          start=$(date +%s)
          dotnet format "$DOTNET_TARGET" --verify-no-changes --no-restore
          end=$(date +%s)
          echo "seconds=$((end-start))" >> "$GITHUB_OUTPUT"

      - name: Build with analyzers enabled
        id: build
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        run: |
          start=$(date +%s)
          dotnet build "$DOTNET_TARGET" --configuration "${{ inputs.build-configuration }}" --no-restore -warnaserror
          end=$(date +%s)
          echo "seconds=$((end-start))" >> "$GITHUB_OUTPUT"

      - name: Scan vulnerable packages
        id: vuln-scan
        if: ${{ inputs.run-vulnerability-scan }}
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        run: dotnet list "$DOTNET_TARGET" package --vulnerable --include-transitive

      - name: Report outdated packages
        id: outdated
        if: ${{ inputs.run-outdated-check }}
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        run: dotnet list "$DOTNET_TARGET" package --outdated --include-transitive
        continue-on-error: true

      - name: Render summary
        if: ${{ always() }}
        uses: webgrip/workflows/.github/composite-actions/workflow-status-summary@main
        with:
          title: '.NET Static Analysis'
          subtitle: 'Quality gate for .NET solutions and projects'
          metadata: |
            [
              {"label":"Runner","value":"arc-runner-set"},
              {"label":"Working directory","value":"${{ inputs.working-directory }}"},
              {"label":"Target","value":"${{ steps.detect-target.outputs.target }}"},
              {"label":"Build configuration","value":"${{ inputs.build-configuration }}"}
            ]
          checks: |
            [
              {"name":"Restore","status":"${{ steps.restore.outcome }}","duration":"${{ steps.restore.outputs.seconds }}s","details":"${{ inputs.restore-arguments != '' && inputs.restore-arguments || 'default restore' }}"},
              {"name":"Format","status":"${{ inputs.run-format-check && steps.format.outcome || 'skipped' }}","duration":"${{ steps.format.outputs.seconds != '' && format('{0}s', steps.format.outputs.seconds) || '-' }}","details":"dotnet format --verify-no-changes"},
              {"name":"Build","status":"${{ steps.build.outcome }}","duration":"${{ steps.build.outputs.seconds }}s","details":"warnings treated as errors"},
              {"name":"Vulnerability scan","status":"${{ inputs.run-vulnerability-scan && steps.vuln-scan.outcome || 'skipped' }}","duration":"-","details":"transitive packages included"},
              {"name":"Outdated packages","status":"${{ inputs.run-outdated-check && steps.outdated.outcome || 'skipped' }}","duration":"-","details":"advisory only"}
            ]
          artifacts: |
            []
          notes: |
            [
              "Runner-provided .NET SDK is used on arc-runner-set.",
              "Outdated package reporting is advisory and does not fail the workflow."
            ]