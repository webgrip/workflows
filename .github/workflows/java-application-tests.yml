name: 'Java Tests'

on:
  workflow_call:
    inputs:
      java-version:
        description: 'Java version to install'
        required: false
        default: '21'
        type: string
      java-distribution:
        description: 'JDK distribution'
        required: false
        default: 'temurin'
        type: string

jobs:
  tests-run:
    name: 'Java test suite'
    runs-on: arc-runner-set

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: ${{ inputs.java-distribution }}
          java-version: ${{ inputs.java-version }}

      - name: Cache Maven and Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: "java-${{ runner.os }}-${{ inputs.java-version }}-${{ hashFiles('**/pom.xml', '**/build.gradle', '**/build.gradle.kts', '**/settings.gradle', '**/settings.gradle.kts', '**/gradle-wrapper.properties') }}"
          restore-keys: |
            java-${{ runner.os }}-${{ inputs.java-version }}-

      - name: Detect Java build tool
        id: detect-build-tool
        shell: bash
        run: |
          if [ -f './mvnw' ] || [ -f './pom.xml' ]; then
            echo 'JAVA_BUILD_TOOL=maven' >> "$GITHUB_ENV"
            echo 'build_tool=maven' >> "$GITHUB_OUTPUT"
            if [ -f './mvnw' ]; then
              echo 'JAVA_BUILD_COMMAND=./mvnw -B -ntp' >> "$GITHUB_ENV"
            else
              echo 'JAVA_BUILD_COMMAND=mvn -B -ntp' >> "$GITHUB_ENV"
            fi
            exit 0
          fi

          if [ -f './gradlew' ] || [ -f './build.gradle' ] || [ -f './build.gradle.kts' ]; then
            echo 'JAVA_BUILD_TOOL=gradle' >> "$GITHUB_ENV"
            echo 'build_tool=gradle' >> "$GITHUB_OUTPUT"
            if [ -f './gradlew' ]; then
              echo 'JAVA_BUILD_COMMAND=./gradlew --no-daemon' >> "$GITHUB_ENV"
            else
              echo 'JAVA_BUILD_COMMAND=gradle --no-daemon' >> "$GITHUB_ENV"
            fi
            exit 0
          fi

          echo 'No Maven or Gradle build files were found.'
          exit 1

      - name: Run tests
        id: test
        shell: bash
        run: |
          start=$(date +%s)
          case "$JAVA_BUILD_TOOL" in
            maven)
              eval "$JAVA_BUILD_COMMAND test"
              ;;
            gradle)
              eval "$JAVA_BUILD_COMMAND test"
              ;;
          esac
          end=$(date +%s)
          echo "seconds=$((end-start))" >> "$GITHUB_OUTPUT"

      - name: Upload test reports
        id: upload-results
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: java-test-results
          path: |
            **/target/surefire-reports
            **/target/failsafe-reports
            **/build/test-results
            **/build/reports/tests
          if-no-files-found: ignore

      - name: Render summary
        if: ${{ always() }}
        uses: webgrip/workflows/.github/composite-actions/workflow-status-summary@main
        with:
          title: 'Java Tests'
          subtitle: 'Test execution for Maven and Gradle projects'
          metadata: |
            [
              {"label":"Runner","value":"arc-runner-set"},
              {"label":"Build tool","value":"${{ steps.detect-build-tool.outputs.build_tool }}"},
              {"label":"Java version","value":"${{ inputs.java-version }}"},
              {"label":"Distribution","value":"${{ inputs.java-distribution }}"}
            ]
          checks: |
            [
              {"name":"Test execution","status":"${{ steps.test.outcome }}","duration":"${{ steps.test.outputs.seconds }}s","details":"maven test or gradle test"},
              {"name":"Report upload","status":"${{ steps.upload-results.outcome }}","duration":"-","details":"artifact java-test-results"}
            ]
          artifacts: |
            ["java-test-results"]
