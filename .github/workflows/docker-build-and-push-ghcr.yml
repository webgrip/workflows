on:
  workflow_call:
    secrets:
      GHCR_TOKEN:
        description: 'Token with packages:write. Optional; defaults to GITHUB_TOKEN.'
        required: false
      DOCKER_USERNAME:
        description: 'Docker Hub username for authenticated pulls (avoids rate limits).'
        required: false
      DOCKER_TOKEN:
        description: 'Docker Hub PAT or password for authenticated pulls.'
        required: false
    inputs:
      docker-context:
        type: string
        description: 'Docker context'
        required: true
        default: '.'
      docker-file:
        type: string
        description: 'Dockerfile path from the context'
        required: true
        default: 'Dockerfile'
      docker-tags:
        type: string
        description: 'Docker tags'
        required: true
      platforms:
        type: string
        description: 'Target platforms (comma-separated)'
        required: false
        default: 'linux/amd64,linux/arm64'
      docker-target:
        type: string
        description: 'Docker target'
        required: false
        default: ''
      docker-build-args:
        type: string
        description: 'Docker build args (newline-separated KEY=VALUE entries)'
        required: false
        default: ''

run-name: ${{ inputs.docker-context }}/${{ inputs.docker-file }}

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: "Docker Build and Push (GHCR)"
    runs-on: arc-runner-set-heavy
    steps:
      - uses: webgrip/workflows/.github/composite-actions/docker-build-push-ghcr@main
        with:
          docker-context: ${{ inputs.docker-context }}
          docker-file: ${{ inputs.docker-file }}
          docker-tags: ${{ inputs.docker-tags }}
          platforms: ${{ inputs.platforms }}
          docker-target: ${{ inputs.docker-target }}
          docker-build-args: ${{ inputs.docker-build-args }}
        env:
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN || github.token }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
