name: '.NET Tests'

on:
  workflow_call:
    inputs:
      dotnet-version:
        description: '.NET SDK version to install'
        required: false
        default: '8.0.x'
        type: string

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: true

jobs:
  tests-run:
    name: 'dotnet test'
    runs-on: arc-runner-set

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet-version }}
          cache: true
          cache-dependency-path: |
            **/packages.lock.json
            **/*.csproj
            **/*.fsproj
            **/*.vbproj
            **/*.props
            **/*.targets
            global.json
            NuGet.Config

      - name: Detect .NET target
        shell: bash
        run: |
          target_path="$(find . -maxdepth 5 \( -name '*.sln' -o -name '*.csproj' -o -name '*.fsproj' -o -name '*.vbproj' \) | sort | head -n 1)"
          if [ -z "$target_path" ]; then
            echo "No .NET solution or project files were found."
            exit 1
          fi

          echo "DOTNET_TARGET=$target_path" >> "$GITHUB_ENV"

      - name: Restore dependencies
        shell: bash
        run: dotnet restore "$DOTNET_TARGET"

      - name: Build test targets
        shell: bash
        run: dotnet build "$DOTNET_TARGET" --configuration Release --no-restore

      - name: Run tests
        shell: bash
        run: |
          mkdir -p TestResults
          dotnet test "$DOTNET_TARGET" --configuration Release --no-build --logger "trx;LogFileName=test-results.trx" --results-directory TestResults

      - name: Upload test results
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-test-results
          path: TestResults
          if-no-files-found: ignore
