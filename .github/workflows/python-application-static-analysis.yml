name: 'Python Static Analysis'

on:
  workflow_call:
    inputs:
      python-version:
        description: 'Python version to install'
        required: false
        default: '3.12'
        type: string

jobs:
  static-analysis-run:
    name: 'Static Analysis (Ruff, MyPy, Bandit, Pip Audit, Deptry)'
    runs-on: arc-runner-set

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Cache Python package downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: "python-${{ runner.os }}-${{ inputs.python-version }}-${{ hashFiles('**/requirements*.txt', '**/pyproject.toml', '**/setup.cfg', '**/setup.py') }}"
          restore-keys: |
            python-${{ runner.os }}-${{ inputs.python-version }}-

      - name: Install project dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip

          installed_requirements='false'

          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
            installed_requirements='true'
          fi

          if [ -f requirements-dev.txt ]; then
            python -m pip install -r requirements-dev.txt
            installed_requirements='true'
          fi

          if [ "$installed_requirements" = 'false' ] && [ -f pyproject.toml ]; then
            python -m pip install -e '.[dev]' || python -m pip install -e .
            installed_requirements='true'
          fi

          if [ "$installed_requirements" = 'false' ] && [ -f setup.py ]; then
            python -m pip install -e .
            installed_requirements='true'
          fi

          if [ "$installed_requirements" = 'false' ]; then
            echo 'No Python dependency manifest was found.'
            exit 1
          fi

      - name: Audit installed packages
        shell: bash
        run: |
          python -m pip install pip-audit
          pip-audit

      - name: Report outdated packages
        shell: bash
        run: python -m pip list --outdated
        continue-on-error: true

      - name: Install analysis tooling
        shell: bash
        run: python -m pip install ruff mypy bandit deptry

      - name: Verify formatting
        shell: bash
        run: ruff format --check .

      - name: Run linting
        shell: bash
        run: ruff check .

      - name: Run type checks
        shell: bash
        run: |
          if [ -f mypy.ini ] || [ -f .mypy.ini ] || grep -q '\[tool.mypy\]' pyproject.toml 2>/dev/null; then
            mypy .
            exit 0
          fi

          echo 'MyPy is not configured; skipping.'

      - name: Run security linting
        shell: bash
        run: bandit -r . -x ./tests,./.venv,./build,./dist

      - name: Run dependency hygiene checks
        shell: bash
        run: |
          if [ -f pyproject.toml ]; then
            deptry .
            exit 0
          fi

          echo 'Deptry requires pyproject.toml; skipping.'
