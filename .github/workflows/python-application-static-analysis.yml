name: 'Python Static Analysis'

on:
  workflow_call:
    inputs:
      python-version:
        description: 'Python version to install'
        required: false
        default: '3.12'
        type: string

jobs:
  static-analysis-run:
    name: 'Static Analysis (Ruff, MyPy, Bandit, Pip Audit, Deptry)'
    runs-on: arc-runner-set

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Cache Python package downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: "python-${{ runner.os }}-${{ inputs.python-version }}-${{ hashFiles('**/requirements*.txt', '**/pyproject.toml', '**/setup.cfg', '**/setup.py') }}"
          restore-keys: |
            python-${{ runner.os }}-${{ inputs.python-version }}-

      - name: Install project dependencies
        id: install-dependencies
        shell: bash
        run: |
          start=$(date +%s)
          python -m pip install --upgrade pip

          installed_requirements='false'

          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
            installed_requirements='true'
          fi

          if [ -f requirements-dev.txt ]; then
            python -m pip install -r requirements-dev.txt
            installed_requirements='true'
          fi

          if [ "$installed_requirements" = 'false' ] && [ -f pyproject.toml ]; then
            python -m pip install -e '.[dev]' || python -m pip install -e .
            installed_requirements='true'
          fi

          if [ "$installed_requirements" = 'false' ] && [ -f setup.py ]; then
            python -m pip install -e .
            installed_requirements='true'
          fi

          if [ "$installed_requirements" = 'false' ]; then
            echo 'No Python dependency manifest was found.'
            exit 1
          fi
          end=$(date +%s)
          echo "seconds=$((end-start))" >> "$GITHUB_OUTPUT"

      - name: Audit installed packages
        id: audit
        shell: bash
        run: |
          python -m pip install pip-audit
          pip-audit

      - name: Report outdated packages
        id: outdated
        shell: bash
        run: python -m pip list --outdated
        continue-on-error: true

      - name: Install analysis tooling
        id: install-tooling
        shell: bash
        run: python -m pip install ruff mypy bandit deptry

      - name: Verify formatting
        id: format
        shell: bash
        run: ruff format --check .

      - name: Run linting
        id: lint
        shell: bash
        run: ruff check .

      - name: Run type checks
        id: typecheck
        shell: bash
        run: |
          if [ -f mypy.ini ] || [ -f .mypy.ini ] || grep -q '\[tool.mypy\]' pyproject.toml 2>/dev/null; then
            mypy .
            exit 0
          fi

          echo 'MyPy is not configured; skipping.'

      - name: Run security linting
        id: security
        shell: bash
        run: bandit -r . -x ./tests,./.venv,./build,./dist

      - name: Run dependency hygiene checks
        id: dependency-hygiene
        shell: bash
        run: |
          if [ -f pyproject.toml ]; then
            deptry .
            exit 0
          fi

          echo 'Deptry requires pyproject.toml; skipping.'

      - name: Render summary
        if: ${{ always() }}
        uses: webgrip/workflows/.github/composite-actions/workflow-status-summary@main
        with:
          title: 'Python Static Analysis'
          subtitle: 'Quality gate for Python applications and libraries'
          metadata: |
            [
              {"label":"Runner","value":"arc-runner-set"},
              {"label":"Python version","value":"${{ inputs.python-version }}"}
            ]
          checks: |
            [
              {"name":"Install dependencies","status":"${{ steps.install-dependencies.outcome }}","duration":"${{ steps.install-dependencies.outputs.seconds }}s","details":"project dependencies resolved"},
              {"name":"Package audit","status":"${{ steps.audit.outcome }}","duration":"-","details":"pip-audit"},
              {"name":"Outdated packages","status":"${{ steps.outdated.outcome }}","duration":"-","details":"advisory only"},
              {"name":"Analysis tooling install","status":"${{ steps.install-tooling.outcome }}","duration":"-","details":"ruff, mypy, bandit, deptry"},
              {"name":"Format","status":"${{ steps.format.outcome }}","duration":"-","details":"ruff format --check"},
              {"name":"Lint","status":"${{ steps.lint.outcome }}","duration":"-","details":"ruff check"},
              {"name":"Typecheck","status":"${{ steps.typecheck.outcome }}","duration":"-","details":"mypy when configured"},
              {"name":"Security linting","status":"${{ steps.security.outcome }}","duration":"-","details":"bandit recursive scan"},
              {"name":"Dependency hygiene","status":"${{ steps.dependency-hygiene.outcome }}","duration":"-","details":"deptry when pyproject.toml exists"}
            ]
          notes: |
            ["Outdated package reporting is advisory and does not fail the workflow."]
