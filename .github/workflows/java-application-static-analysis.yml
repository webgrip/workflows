name: 'Java Static Analysis'

on:
  workflow_call:
    inputs:
      java-version:
        description: 'Java version to install'
        required: false
        default: '21'
        type: string
      java-distribution:
        description: 'JDK distribution'
        required: false
        default: 'temurin'
        type: string

jobs:
  static-analysis-run:
    name: 'Static Analysis (Spotless, Check, Dependency Check, Versions)'
    runs-on: arc-runner-set

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: ${{ inputs.java-distribution }}
          java-version: ${{ inputs.java-version }}

      - name: Cache Maven and Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: "java-${{ runner.os }}-${{ inputs.java-version }}-${{ hashFiles('**/pom.xml', '**/build.gradle', '**/build.gradle.kts', '**/settings.gradle', '**/settings.gradle.kts', '**/gradle-wrapper.properties') }}"
          restore-keys: |
            java-${{ runner.os }}-${{ inputs.java-version }}-

      - name: Detect Java build tool
        shell: bash
        run: |
          if [ -f './mvnw' ] || [ -f './pom.xml' ]; then
            echo 'JAVA_BUILD_TOOL=maven' >> "$GITHUB_ENV"
            if [ -f './mvnw' ]; then
              echo 'JAVA_BUILD_COMMAND=./mvnw -B -ntp' >> "$GITHUB_ENV"
            else
              echo 'JAVA_BUILD_COMMAND=mvn -B -ntp' >> "$GITHUB_ENV"
            fi
            exit 0
          fi

          if [ -f './gradlew' ] || [ -f './build.gradle' ] || [ -f './build.gradle.kts' ]; then
            echo 'JAVA_BUILD_TOOL=gradle' >> "$GITHUB_ENV"
            if [ -f './gradlew' ]; then
              echo 'JAVA_BUILD_COMMAND=./gradlew --no-daemon' >> "$GITHUB_ENV"
            else
              echo 'JAVA_BUILD_COMMAND=gradle --no-daemon' >> "$GITHUB_ENV"
            fi
            exit 0
          fi

          echo 'No Maven or Gradle build files were found.'
          exit 1

      - name: Compile project
        shell: bash
        run: |
          case "$JAVA_BUILD_TOOL" in
            maven)
              eval "$JAVA_BUILD_COMMAND -DskipTests compile"
              ;;
            gradle)
              eval "$JAVA_BUILD_COMMAND assemble -x test"
              ;;
          esac

      - name: Run Spotless checks
        shell: bash
        run: |
          if ! grep -Rqs 'spotless' pom.xml build.gradle build.gradle.kts settings.gradle settings.gradle.kts 2>/dev/null; then
            echo 'Spotless is not configured; skipping.'
            exit 0
          fi

          case "$JAVA_BUILD_TOOL" in
            maven)
              eval "$JAVA_BUILD_COMMAND spotless:check"
              ;;
            gradle)
              eval "$JAVA_BUILD_COMMAND spotlessCheck"
              ;;
          esac

      - name: Run configured static-analysis plugins
        shell: bash
        run: |
          if ! grep -RqsE 'checkstyle|spotbugs|pmd|errorprone' pom.xml build.gradle build.gradle.kts settings.gradle settings.gradle.kts 2>/dev/null; then
            echo 'No configured Java analysis plugins were detected; skipping.'
            exit 0
          fi

          case "$JAVA_BUILD_TOOL" in
            maven)
              eval "$JAVA_BUILD_COMMAND -DskipTests verify"
              ;;
            gradle)
              eval "$JAVA_BUILD_COMMAND check -x test"
              ;;
          esac

      - name: Run dependency security checks
        shell: bash
        run: |
          if [ "$JAVA_BUILD_TOOL" = 'maven' ]; then
            eval "$JAVA_BUILD_COMMAND org.owasp:dependency-check-maven:check"
            exit 0
          fi

          if ! grep -Rqs 'dependency-check' build.gradle build.gradle.kts settings.gradle settings.gradle.kts 2>/dev/null; then
            echo 'OWASP dependency-check is not configured for Gradle; skipping.'
            exit 0
          fi

          eval "$JAVA_BUILD_COMMAND dependencyCheckAnalyze"

      - name: Run policy checks
        shell: bash
        run: |
          if [ "$JAVA_BUILD_TOOL" != 'maven' ]; then
            echo 'No standard Gradle policy task is enforced by this workflow; skipping.'
            exit 0
          fi

          if ! grep -Rqs 'maven-enforcer-plugin' pom.xml 2>/dev/null; then
            echo 'Maven Enforcer is not configured; skipping.'
            exit 0
          fi

          eval "$JAVA_BUILD_COMMAND enforcer:enforce"

      - name: Report outdated dependencies
        shell: bash
        run: |
          case "$JAVA_BUILD_TOOL" in
            maven)
              eval "$JAVA_BUILD_COMMAND org.codehaus.mojo:versions-maven-plugin:2.18.0:display-dependency-updates"
              ;;
            gradle)
              if ! grep -Rqs 'dependencyUpdates' build.gradle build.gradle.kts settings.gradle settings.gradle.kts 2>/dev/null; then
                echo 'Gradle versions plugin is not configured; skipping.'
                exit 0
              fi

              eval "$JAVA_BUILD_COMMAND dependencyUpdates"
              ;;
          esac
        continue-on-error: true
