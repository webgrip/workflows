name: "[Action] Semantic Release"
description: "Use semantic-release to automate versioning and releases"

inputs:
  release-type:
    description: "The type of release"
    required: false
  token:
    description: "Forgejo token to use for checkout/push and releases"
    required: false
  forge-url:
    description: "Public Forgejo base URL used for user-facing changelog/release links (not for API traffic)"
    required: false
    default: "https://forgejo.webgrip.dev"
  git-user-name:
    description: "Account name matching the token, used for push auth against the public host"
    required: false
    default: "webgrip-ci"

outputs:
  version:
    description: "The new version number"
    value: ${{ steps.semantic-release.outputs.version }}

runs:
  using: "composite"
  steps:
    - name: Check out repo
      uses: actions/checkout@v5
      with:
        fetch-depth: 0 # semantic-release requires all commits/tags
        token: ${{ inputs.token || github.token }}

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "22"

    - name: Install dependencies
      shell: bash
      run: npm ci || true

    - name: Build
      shell: bash
      run: npm run build || true

    - name: Set semantic-release config file
      id: set-config
      shell: bash
      run: |
        if [[ -n "${{ inputs.release-type }}" ]]; then
          if [[ -f ".releaserc.${{ inputs.release-type }}.js" ]]; then
            echo "release_config=--extends=./.releaserc.${{ inputs.release-type }}.js" >> "$GITHUB_OUTPUT"
          elif [[ -f ".releaserc.${{ inputs.release-type }}.json" ]]; then
            echo "release_config=--extends=./.releaserc.${{ inputs.release-type }}.json" >> "$GITHUB_OUTPUT"
          fi
        else
          if [[ -f ".releaserc.js" ]]; then
            echo "release_config=--config=./.releaserc.js" >> "$GITHUB_OUTPUT"
          elif [[ -f ".releaserc.json" ]]; then
            echo "release_config=--config=./.releaserc.json" >> "$GITHUB_OUTPUT"
          fi
        fi

    - name: Run semantic-release
      shell: bash
      id: semantic-release
      env:
        GITHUB_OUTPUT: $GITHUB_OUTPUT
        # Split addressing: the release API call stays in-cluster (github.server_url =
        # http://forgejo-http.forgejo.svc.cluster.local:3000 on the runner) so it never hairpins out
        # through the ingress, while the user-facing changelog/release links use the public host
        # (forge-url) via --repository-url below.
        GITEA_URL: ${{ github.server_url }}
        GITEA_TOKEN: ${{ inputs.token || github.token }}
        # --repository-url makes semantic-release push tags (and @semantic-release/git push
        # commits) to the PUBLIC host, which the checkout's in-cluster extraheader credential
        # does not cover. GIT_CREDENTIALS is the env var semantic-release core understands for
        # building an authenticated push URL. Components must be URL-encoded if they contain
        # reserved characters.
        GIT_CREDENTIALS: ${{ inputs.git-user-name }}:${{ inputs.token || github.token }}
      run: |
        npm install --no-save \
          semantic-release \
          @semantic-release/changelog \
          @semantic-release/commit-analyzer \
          @semantic-release/exec \
          @semantic-release/git \
          @saithodev/semantic-release-gitea \
          semantic-release-helm3 \
          @semantic-release/release-notes-generator \
          conventional-changelog-conventionalcommits
        # Forgejo: dropped semantic-release-github-actions-tags (GitHub-Actions-specific, no analog)

        # --repository-url pins the changelog compare/commit links and release URL to the public host.
        # semantic-release would otherwise derive it from the CI checkout's origin remote (internal).
        npx semantic-release \
          --repository-url "${{ inputs.forge-url }}/${{ github.repository }}.git" \
          ${{ steps.set-config.outputs.release_config }}
