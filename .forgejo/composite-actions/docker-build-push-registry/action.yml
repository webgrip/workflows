name: "[Action] Build and Push Docker Image (Registry)"
description: "Builds and pushes a multi-arch Docker image to a configurable OCI registry (Harbor, GHCR, …). Single source of build/login/tag-normalization/summary logic; the per-registry reusable workflows (docker-build-and-push-{harbor,ghcr}.yml) wrap this via docker-build-and-push-registry.yml. Auth: REGISTRY_USERNAME/REGISTRY_TOKEN for the target registry; optional DOCKER_USERNAME/DOCKER_TOKEN for authenticated base-image pulls."

inputs:
  registry:
    description: "Target registry host, e.g. harbor.webgrip.dev."
    required: true
  docker-context:
    description: "Docker context"
    required: true
    default: "."
  docker-file:
    description: "Dockerfile path from the context"
    required: true
    default: "Dockerfile"
  docker-tags:
    description: "One tag per line: OWNER/IMAGE[:TAG] or <registry>/OWNER/IMAGE[:TAG] (defaults :latest, enforces the configured registry)"
    required: true
  platforms:
    description: "Target platforms (comma-separated)"
    required: false
    default: "linux/amd64,linux/arm64"
  docker-target:
    description: "Docker target"
    required: false
    default: ""
  docker-build-args:
    description: "Docker build args (newline-separated KEY=VALUE entries)"
    required: false
    default: ""
  compression:
    description: "Layer compression for the pushed image: 'gzip' (default) or 'zstd'. zstd layers decompress ~2x faster on pull; opt-in because very old dockerd cannot pull zstd."
    required: false
    default: "gzip"

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v4

    - name: Log in to Docker Hub (authenticated pulls)
      if: env.DOCKER_USERNAME != '' && env.DOCKER_TOKEN != ''
      uses: docker/login-action@v3
      with:
        username: ${{ env.DOCKER_USERNAME }}
        password: ${{ env.DOCKER_TOKEN }}

    - uses: docker/setup-qemu-action@v3
    - uses: docker/setup-buildx-action@v3
    - uses: docker/login-action@v3
      with:
        registry: ${{ inputs.registry }}
        username: ${{ env.REGISTRY_USERNAME }}
        password: ${{ env.REGISTRY_TOKEN }}

    - name: Enforce registry tag format
      id: normalized-tags
      shell: bash
      env:
        REGISTRY: ${{ inputs.registry }}
      run: |
        set -euo pipefail

        if [[ -z "${REGISTRY//[[:space:]]/}" ]]; then
          echo "registry input is empty" >&2
          exit 1
        fi

        raw="${{ inputs.docker-tags }}"
        if [[ -z "${raw//[[:space:]]/}" ]]; then
          echo "docker-tags input is empty" >&2
          exit 1
        fi

        normalized=()
        while IFS= read -r line; do
          tag="${line//$'\r'/}"

          # Trim leading/trailing whitespace (pure bash).
          tag="${tag#"${tag%%[![:space:]]*}"}"
          tag="${tag%"${tag##*[![:space:]]}"}"

          [[ -z "$tag" ]] && continue

          # Accept either:
          #   - OWNER/IMAGE[:TAG]
          #   - <registry>/OWNER/IMAGE[:TAG]
          if [[ "$tag" != "$REGISTRY"/* ]]; then
            # If the first component looks like a registry, reject unless it's the configured one.
            # Docker treats the first component as a registry only when it contains '.' or ':' or is 'localhost'.
            first="${tag%%/*}"
            if [[ "$tag" == */* && ( "$first" == *.* || "$first" == *:* || "$first" == "localhost" ) ]]; then
              echo "Only the '$REGISTRY' registry is allowed: '$tag'" >&2
              exit 1
            fi

            if [[ "$tag" != */* ]]; then
              echo "Tag must be 'OWNER/IMAGE[:TAG]' or '$REGISTRY/OWNER/IMAGE[:TAG]': '$tag'" >&2
              exit 1
            fi
            tag="$REGISTRY/$tag"
          fi

          # Default tag to :latest.
          if [[ "$tag" == *: ]]; then
            tag="${tag}latest"
          elif [[ "$tag" != *:* ]]; then
            tag="${tag}:latest"
          fi

          normalized+=("$tag")
        done <<< "$raw"

        if (( ${#normalized[@]} == 0 )); then
          echo "No valid tags found" >&2
          exit 1
        fi

        {
          echo 'tags<<EOF'
          printf '%s\n' "${normalized[@]}"
          echo 'EOF'
        } >> "$GITHUB_OUTPUT"
    - name: Get cache tag
      id: cache-tag
      shell: bash
      run: |
        # Split the normalized tags by newline, ignore empty lines, and select the first tag.
        primary=$(echo "${{ steps.normalized-tags.outputs.tags }}" | grep -v '^\s*$' | head -n 1)
        # Use :cache to avoid conflicts with the image's actual release tags.
        cache="${primary%:*}:cache"
        echo "cache_tag=$cache" >> "$GITHUB_OUTPUT"
    - name: Compute image output spec
      id: image-output
      shell: bash
      env:
        COMPRESSION: ${{ inputs.compression }}
      run: |
        # zstd layers decompress ~2x faster on pull; opt-in because very old dockerd cannot
        # pull zstd. When zstd, push is expressed via an explicit image output (replacing
        # `push: true`); when gzip, the output stays empty and the invocation is unchanged.
        if [[ "$COMPRESSION" == "zstd" ]]; then
          echo "outputs=type=image,compression=zstd,compression-level=3,force-compression=true,push=true" >> "$GITHUB_OUTPUT"
        else
          echo "outputs=" >> "$GITHUB_OUTPUT"
        fi
    - name: Build and push image
      id: build
      uses: docker/build-push-action@v6
      env:
        DOCKER_BUILD_SUMMARY: "false"
      with:
        context: ${{ inputs.docker-context }}
        file: ${{ inputs.docker-context }}/${{ inputs.docker-file }}
        platforms: ${{ inputs.platforms }}
        # zstd pushes via the image output spec instead; both at once would double-express push.
        push: ${{ inputs.compression != 'zstd' }}
        outputs: ${{ steps.image-output.outputs.outputs }}
        tags: |
          ${{ steps.normalized-tags.outputs.tags }}
        target: ${{ inputs.docker-target }}
        build-args: |
          ${{ inputs.docker-build-args }}
        cache-from: type=registry,ref=${{ steps.cache-tag.outputs.cache_tag }}
        cache-to: type=registry,ref=${{ steps.cache-tag.outputs.cache_tag }},mode=max,compression=zstd

    - name: Render build summary
      if: always()
      uses: https://github.com/actions/github-script@v8
      env:
        BUILD_DIGEST: ${{ steps.build.outputs.digest }}
        BUILD_METADATA: ${{ steps.build.outputs.metadata }}
        BUILD_TAGS: ${{ steps.normalized-tags.outputs.tags }}
        BUILD_CONTEXT: ${{ inputs.docker-context }}
        BUILD_FILE: ${{ inputs.docker-file }}
        BUILD_PLATFORMS: ${{ inputs.platforms }}
        BUILD_TARGET: ${{ inputs.docker-target }}
        BUILD_CACHE_TAG: ${{ steps.cache-tag.outputs.cache_tag }}
      with:
        script: |
          const digest = (process.env.BUILD_DIGEST || '').trim();
          const metadataRaw = process.env.BUILD_METADATA || '';
          const tagsRaw = process.env.BUILD_TAGS || '';
          const contextPath = process.env.BUILD_CONTEXT || '.';
          const dockerfilePath = process.env.BUILD_FILE || 'Dockerfile';
          const platforms = process.env.BUILD_PLATFORMS || '';
          const target = process.env.BUILD_TARGET || '';
          const cacheTag = process.env.BUILD_CACHE_TAG || '';

          const tags = tagsRaw
            .split('\n')
            .map((value) => value.trim())
            .filter(Boolean);

          const detailsBlock = (title, bodyMarkdown) =>
            `\n<details><summary><strong>${title}</strong></summary>\n\n${bodyMarkdown}\n</details>\n`;

          const fenced = (lang, content) =>
            '```' + lang + '\n' + String(content).replace(/```/g, '`\u200b``') + '\n```';

          core.summary
            .addHeading('Docker Build and Push (Registry)', 2)
            .addTable([
              [
                { data: 'Field', header: true },
                { data: 'Value', header: true },
              ],
              ['Context', contextPath],
              ['Dockerfile', `${contextPath}/${dockerfilePath}`],
              ['Platforms', platforms || '-'],
              ['Target', target || '-'],
              ['Cache tag', cacheTag || '-'],
              ['Digest', digest || '-'],
            ])
            .addEOL();

          if (tags.length > 0) {
            core.summary
              .addHeading('Published Tags', 3)
              .addRaw(tags.map((tag) => `- ${tag}`).join('\n'))
              .addEOL()
              .addEOL();
          }

          if (metadataRaw.trim()) {
            try {
              const metadata = JSON.parse(metadataRaw);
              core.summary.addRaw(detailsBlock('Build metadata', fenced('json', JSON.stringify(metadata, null, 2))));
            } catch {
              core.summary.addRaw(detailsBlock('Build metadata (raw)', fenced('json', metadataRaw)));
            }
          }

          await core.summary.write();
