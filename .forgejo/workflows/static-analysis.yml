name: 'Static Analysis'

# Forgejo (2026-07-18): JS actions (actions/checkout, actions/cache) CANNOT run inside a
# `container:` on act_runner — the image ships no Node, so the action dies before any step logic.
# Proven by isolation diagnostic (a job whose ONLY step was actions/checkout in a container failed;
# the identical step on the native runner passed). Consequences applied here:
#   - check out with plain `git` instead of actions/checkout
#   - install deps in-job instead of restoring `vendor/` via actions/cache (also unavailable)
#   - image php:8.2-cli -> composer:2.8.5, which bundles PHP *and* composer *and* git
#     (php:8.2-cli has neither git nor composer, so it cannot self-checkout or install)

on:
  workflow_call:
    secrets:
      COMPOSER_TOKEN:
        description: 'Composer packagist token (private packagist)'
        required: false
      FORGEJO_TOKEN:
        description: 'Forgejo token — only needed to clone a PRIVATE repository'
        required: false

jobs:
  static-analysis-run:
    name: 'Static Analysis (PHPStan, PHPMD, PHPCS, Rector)'
    runs-on: docker
    container:
      image: composer:2.8.5
      env:
        COMPOSER_AUTH: >
          {
            "http-basic": {
              "repo.packagist.com": {
                  "username": "token",
                  "password": "${{ secrets.COMPOSER_TOKEN }}"
              }
            }
          }
    steps:
      - name: 'Checkout (plain git — JS actions cannot run in this container)'
        env:
          FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
        run: |
          set -eu
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"
          url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git"
          if [ -n "${FORGEJO_TOKEN:-}" ]; then
            url="$(printf '%s' "${GITHUB_SERVER_URL}" | sed "s#://#://token:${FORGEJO_TOKEN}@#")/${GITHUB_REPOSITORY}.git"
          fi
          git clone --depth 50 --branch "${GITHUB_REF_NAME}" "$url" .
          git checkout -q "${GITHUB_SHA}" 2>/dev/null || echo "note: ${GITHUB_SHA} outside clone depth; using branch tip"
          git log -1 --oneline

      - name: 'Install dependencies'
        run: composer install --prefer-dist --no-interaction --ignore-platform-reqs

      - name: Run phpcs
        run: ./vendor/bin/phpcs -q -s --standard=./phpcs.xml ./src --report=full --exclude=Generic.Files.LineLength
        continue-on-error: true

      - name: Run phpcs (Full)
        run: ./vendor/bin/phpcs -q -s --standard=./phpcs.xml ./src --report=full --ignore-annotations
        if: always()
        continue-on-error: true

      - name: Run phpmd
        run: ./vendor/bin/phpmd --strict --color ./src text ./phpmd.xml
        if: always()
        continue-on-error: true

      - name: Run phpstan
        run: ./vendor/bin/phpstan --configuration=./phpstan.neon analyse ./src --level 8 --error-format=table
        if: always()
        continue-on-error: true

      - name: Run psalm
        run: php ./psalm.phar --config=psalm.xml --output-format=compact --generate-json-map=psalm-output.json
        if: always()
        continue-on-error: true

      - name: Run rector
        run: ./vendor/bin/rector --config=./rector.php process ./src --dry-run
        if: always()
        continue-on-error: true

  composer-normalize:
    name: 'Composer Normalize'
    runs-on: docker
    container:
      image: composer:2.8.5
    steps:
      - name: 'Checkout (plain git — JS actions cannot run in this container)'
        env:
          FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
        run: |
          set -eu
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"
          url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git"
          if [ -n "${FORGEJO_TOKEN:-}" ]; then
            url="$(printf '%s' "${GITHUB_SERVER_URL}" | sed "s#://#://token:${FORGEJO_TOKEN}@#")/${GITHUB_REPOSITORY}.git"
          fi
          git clone --depth 50 --branch "${GITHUB_REF_NAME}" "$url" .
          git checkout -q "${GITHUB_SHA}" 2>/dev/null || echo "note: ${GITHUB_SHA} outside clone depth; using branch tip"

      # `composer normalize` is provided by the ergebnis/composer-normalize dev-dependency, so the
      # deps must be installed first — previously this job inherited `vendor/` from actions/cache.
      - name: 'Install dependencies'
        run: composer install --prefer-dist --no-interaction --ignore-platform-reqs

      - run: composer normalize
