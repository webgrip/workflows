name: "Update TechDocs"

on:
  workflow_call:
    inputs:
      source-dir:
        type: string
        description: 'The directory containing the techdocs files'
        required: false
        default: 'docs/techdocs'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate-techdocs:
    name: "techdocs"
    runs-on: docker
    # First-party build image via the in-cluster Harbor ghcr pull-through (LAN-cached, and the
    # DinD can pull it anonymously). Was `webgrip/techdocs-runner:latest` -- an unqualified
    # docker.io ref last pushed 2025-03-09, off our own supply chain. techdocs-runner is just
    # `FROM techdocs-builder` + a `mkdocs serve` entrypoint; CI runs `techdocs-cli generate`, not
    # serve, and techdocs-builder already ships @techdocs/cli + mkdocs + plantuml, so the runner
    # is redundant here (verified: the generate command below succeeds in techdocs-builder).
    container: harbor.webgrip.dev/ghcr/webgrip/techdocs-builder:latest
    steps:
      - uses: actions/checkout@v4

      - run: |
          techdocs-cli generate --no-docker --verbose --source-dir ${{ inputs.source-dir }} --output-dir techdocs-site

      # forgejo/* fork, NOT actions/*: upload-artifact@v4 ships @actions/artifact v2, which refuses
      # to run against anything that is not github.com — Forgejo reads as GHES, so the step dies
      # with "GHESNotSupportedError ... not currently supported on GHES" AFTER the docs have already
      # built successfully. Forgejo maintains a patched fork at the same major version.
      - name: Put in artifact
        uses: forgejo/upload-artifact@v4
        with:
          name: techdocs-site
          path: techdocs-site
          retention-days: 1
