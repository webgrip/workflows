name: '[Call] Push Helm Chart'

on:
  workflow_call:
    secrets:
      REGISTRY_USERNAME:
        description: 'Registry username (e.g. Harbor robot account) with push access.'
        required: true
      REGISTRY_TOKEN:
        description: 'Registry password/token (e.g. Harbor robot token) with push access.'
        required: true
    inputs:
      registry:
        description: 'Target registry host, e.g. harbor.<domain> (Harbor) or the Forgejo registry host.'
        type: string
        required: true
      path:
        description: 'Path to the Helm chart you wish to validate'
        type: string
        required: true
      name:
        description: 'Name of the Helm chart'
        type: string
        required: true
      version:
        description: 'Version of the Helm chart'
        type: string
        required: true
      ref:
        description: 'Git ref to check out. Defaults to the version — pass the tag explicitly for repos whose tags are prefixed (e.g. chart-v1.2.3).'
        type: string
        required: false
      oci-path:
        description: 'OCI repository path under the registry. Defaults to <owner>/<repo>.'
        type: string
        required: false
      best-effort:
        description: 'Do not fail the caller when the push fails (e.g. best-effort mirrors). Lives here because caller jobs with `uses:` cannot set continue-on-error.'
        type: boolean
        required: false
        default: false
      enabled:
        description: 'Gate the job from INSIDE the reusable. Forgejo v15 flattening drops if-conditions on uses-caller jobs, so pass conditions (e.g. a non-empty release version) here instead.'
        type: boolean
        required: false
        default: true

jobs:
  helm-chart-push:
    name: 'Push Helm Chart'
    if: inputs.enabled
    runs-on: docker
    continue-on-error: ${{ inputs.best-effort }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || inputs.version }} # Make sure we are on the tagged versioned commit
      # helm is baked into the ci-runner host image; setup-helm remains as fallback for
      # runners without it.
      - name: Check for preinstalled helm
        id: helm-check
        shell: bash
        run: |
          if command -v helm >/dev/null 2>&1; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: azure/setup-helm@v4
        if: steps.helm-check.outputs.present != 'true'
      # validate again?
      - name: Registry login
        shell: bash
        env:
          # Pass creds via env, not `${{ }}` interpolation into the shell: Harbor robot usernames
          # are `robot$project+name` — the `$` gets expanded by bash inside a double-quoted arg and
          # mangles the username to 401. Env-var expansion is not recursive, so the value stays literal.
          REGISTRY: ${{ inputs.registry }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
        run: |
          printf '%s' "$REGISTRY_TOKEN" | helm registry login "$REGISTRY" --username "$REGISTRY_USERNAME" --password-stdin
      - run: |
          export HELM_EXPERIMENTAL_OCI=1
      - run: |
          helm package ${{ inputs.path }}
          helm push ./${{ inputs.name }}-${{ inputs.version }}.tgz oci://${{ inputs.registry }}/${{ inputs.oci-path || github.repository }}
